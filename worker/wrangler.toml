name = "ttimes-editor"
main = "index.js"
compatibility_date = "2024-01-01"

# US region placement (Cloudflare AI Gateway 등 호환)
[placement]
mode = "smart"

[[kv_namespaces]]
binding = "SESSIONS"
id = "KV_ID_여기에_입력"   # wrangler kv:namespace create SESSIONS 로 생성 후 교체

# Secrets (wrangler secret put 으로 설정):
# - OPENAI_API_KEY
# - GEMINI_API_KEY
